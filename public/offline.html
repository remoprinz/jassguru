<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JassGuru – Offline</title>
  <style>
    /* Inline-CSS, weil bei Offline keine externen Stylesheets laden */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1a1a1a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Chalkboard-Look passend zur App */
    body {
      background:
        linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%),
        radial-gradient(circle at 30% 40%, #2a2a2a 0%, #1a1a1a 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .container {
      max-width: 420px;
      width: calc(100% - 2.5rem);
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'Capita', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #c5c5c5;
      margin-bottom: 1rem;
    }

    .hint {
      font-size: 0.85rem;
      color: #909090;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    button {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover { background: #15803d; }
    button:active { transform: scale(0.96); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #909090;
      margin-bottom: 1rem;
    }

    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">
      <img src="/welcome-guru-clean.png" alt="JassGuru" onerror="this.style.display='none'" />
    </div>

    <div class="status">Keine Internetverbindung</div>

    <h1>Offline</h1>

    <p>
      JassGuru braucht eine Internetverbindung, um deine Statistiken und Gruppen zu laden.
    </p>

    <button onclick="window.location.reload()">
      Erneut versuchen
    </button>

    <p class="hint">
      Tipp: Sobald du wieder online bist, kannst du im Gast-Modus auch komplett offline jassen — Punkte werden lokal gespeichert.
    </p>
  </main>

  <script>
    // Auto-Retry, sobald wir wieder online sind
    window.addEventListener('online', function () {
      window.location.reload();
    });
  </script>
</body>
</html>
